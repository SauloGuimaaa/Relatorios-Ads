<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FTX Imóveis | BrandField Performance</title>
  <meta name="description" content="Relatórios de performance da FTX Imóveis — BrandField Agência Criativa." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #090909;
      --surface: #111111;
      --surface-hover: #1a1a1a;
      --primary: #8bc34a;
      --magenta: #e040fb;
      --cyan: #00bcd4;
      --text: #f5edd8;
      --muted: #888;
      --border: #222222;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      line-height: 1.5;
    }

    a { color: inherit; text-decoration: none; }

    .wrap {
      width: min(1100px, 92vw);
      margin: 0 auto;
      padding: 2.5rem 0 4rem;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
    }

    .back-link {
      font-size: 0.85rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--primary); }

    .header-info { margin-left: auto; text-align: right; }
    .header-info .label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .header-info .value { font-size: 0.9rem; color: var(--text); }

    /* Hero */
    .hero { margin-bottom: 3rem; }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }
    .hero h1 em { font-style: italic; color: var(--magenta); }
    .hero p { color: var(--muted); font-size: 1rem; max-width: 52ch; }

    /* Segment badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.3rem 0.75rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
      margin-bottom: 1.2rem;
    }

    /* Years grid */
    .section-title {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .year-card {
      display: block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem 2rem;
      transition: border-color 0.2s, transform 0.2s;
      max-width: 320px;
    }
    .year-card:hover {
      border-color: rgba(139,195,74,0.6);
      transform: translateY(-3px);
    }
    .year-card .year-num {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 0.4rem;
    }
    .year-card .year-desc { font-size: 0.88rem; color: var(--muted); }

    /* Footer */
    .footer {
      margin-top: 4rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .footer-brand { font-size: 0.82rem; color: var(--muted); }
    .footer-brand strong { color: var(--primary); }
    .footer-analyst { font-size: 0.78rem; color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="header">
      <a class="back-link" href="../../index.html">← Hub de Performance</a>
      <div class="header-info">
        <div class="label">Analista</div>
        <div class="value">Saulo Guimarães</div>
      </div>
    </header>

    <section class="hero">
      <div class="badge">🏠 Imobiliária</div>
      <h1>FTX <em>Imóveis</em></h1>
      <p>Relatórios de performance orgânica (Instagram) — organizados por ano.</p>
    </section>

    <p class="section-title">Anos disponíveis</p>
    <a class="year-card" href="2026/">
      <div class="year-num">2026</div>
      <div class="year-desc">Relatórios mensais · Orgânico</div>
    </a>

    <footer class="footer">
      <div class="footer-brand"><strong>BrandField</strong> Agência Criativa</div>
      <div class="footer-analyst">Performance Analyst: Saulo Guimarães</div>
    </footer>
  </div>
</body>
</html>
