<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gairdin CG | Hub 2026</title>

  <link rel="icon" type="image/svg+xml" href="../../../assets/logo-brandfield.svg" />
  <style>
    :root { --bg:#101010; --card:#1c1c1c; --text:#f5edd8; --muted:#cbbfa8; --brand:#8bc34a; --border:#2f2f2f; }
    *{box-sizing:border-box} body{margin:0;min-height:100vh;font-family:"DM Sans",Arial,sans-serif;color:var(--text);background:radial-gradient(circle at top, rgba(139,195,74,.12), transparent 45%), var(--bg)}
    main{width:min(900px,92vw);margin:0 auto;padding:2rem 0 3rem} h1{margin:.2rem 0 1.2rem;font-family:"Playfair Display",Georgia,serif}
    p{color:var(--muted);margin:0 0 1.4rem}.back{color:var(--brand);text-decoration:none;font-weight:700}
    .grid{display:grid;grid-template-columns:1fr;gap:1rem;list-style:none;padding:0}.card{display:block;padding:1rem;border-radius:14px;border:1px solid var(--border);background:var(--card);color:var(--text);text-decoration:none}
    .card:hover,.card:focus-visible{border-color:var(--brand);outline:none}.title{margin:0 0 .3rem;font-family:"Playfair Display",Georgia,serif}.path{margin:0;color:var(--muted);font-size:.92rem}
    @media (min-width:760px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
  </style>
</head>
<body>
  <main>

        </a>
      </li>
      <li>
        <a class="card" href="fevereiro/index.html">
          <h2 class="title">2026 · Fevereiro</h2>
          <p class="path">/clientes/gairdin-cg/2026/fevereiro/</p>
        </a>
      </li>
    </ul>
  </main>
</body>
</html>
